  <script>
    // 中英文对照字典
    const langDict = {
      zh: {

        'nav-contact': '联系我们',
        'nav-store': '商店',

        'hero-subtitle': '专注于开发高效 HTML 实用工具的工作室',
        'hero-btn1': '探索产品',

        // 核心优势
        'features-title': '核心优势',
        'features-subtitle': '我们的产品为您带来极致的使用体验',
        'feature-1-title': '轻量高效',
        'feature-1-desc': '无冗余功能，专注核心体验，启动速度快，运行流畅',
        'feature-2-title': '安全可靠',
        'feature-2-desc': '绿色免安装，无广告无捆绑，保护您的隐私安全',
        'feature-3-title': '功能强大',
        'feature-3-desc': '满足多样化使用场景，持续更新迭代，优化用户体验',
        // 行动召唤
        'cta-title': '开始使用 LzxOffice',
        'cta-subtitle': '立即体验我们的产品，提升您的工作和学习效率',
        'cta-btn': '下载产品',
        // 页脚
        'footer-intro': '专注于开发高质量智能办公工具的技术团队',
        'footer-quicklinks': '快速链接',
        'footer-projects': '项目',
        'prod-caller-name': '随机点名器',
        'prod-chess-name': '棋类大战',
        'footer-moretools': '更多工具',
        'footer-copyright': '&copy; 2025 LzxOffice. 保留所有权利。',
        // 切换按钮
        'toggle-btn': '切换为英文',
        'mobile-toggle-btn': 'En'
      },
      en: {
        // 导航
        'nav-home': 'Home',
        'nav-products': 'Products Download',
        'nav-contact': 'Contact Us',
        'nav-store': 'Store',
        // 首页英雄区
        'hero-title': 'LZX Office',
        'hero-subtitle': 'A team focused on developing efficient HTML tools',
        'hero-btn1': 'Explore Products',
        'hero-btn2': 'Contact Us',
        // 核心优势
        'features-title': 'Core Advantages',
        'features-subtitle': 'Our products bring you an ultimate user experience',
        'feature-1-title': 'Lightweight & Efficient',
        'feature-1-desc': 'No redundant functions, focus on core experience, fast startup and smooth operation',
        'feature-2-title': 'Safe & Reliable',
        'feature-2-desc': 'Green and portable, no ads or bundling, protect your privacy and security',
        'feature-3-title': 'Powerful Functions',
        'feature-3-desc': 'Meet diverse usage scenarios, continuous updates and iterations, optimize user experience',
        // 行动召唤
        'cta-title': 'Start Using LzxOffice',
        'cta-subtitle': 'Experience our products now and improve your work and study efficiency',
        'cta-btn': 'Download Products',
        // 页脚
        'footer-intro': 'A technical team focused on developing high-quality intelligent office tools',
        'footer-quicklinks': 'Quick Links',
        'footer-projects': 'Projects',
        'prod-caller-name': 'Random Caller',
        'prod-chess-name': 'Board Game Battle',
        'footer-moretools': 'More Tools',
        'footer-copyright': '&copy; 2025 LzxOffice. All Rights Reserved.',
        // 切换按钮
        'toggle-btn': 'Switch to Chinese',
        'mobile-toggle-btn': '中'
      }
    };

    // 当前语言（默认中文）
    let currentLang = 'zh';

    // 核心切换函数
    function switchLanguage() {
      currentLang = currentLang === 'zh' ? 'en' : 'zh';
      
      // 更新页面标题
      document.title = currentLang === 'zh' ? 'LzxOffice - 首页' : 'LzxOffice - Home';
      
      // 更新切换按钮文字
      document.getElementById('lang-btn-text').textContent = langDict[currentLang]['toggle-btn'];
      document.getElementById('lang-btn-text-mobile').textContent = langDict[currentLang]['mobile-toggle-btn'];
      
      // 遍历所有需要翻译的元素
      document.querySelectorAll('[data-lang]').forEach(el => {
        const langKey = el.getAttribute('data-lang');
        el.innerHTML = langDict[currentLang][langKey];
      });
    }

    // 绑定切换按钮事件
    document.getElementById('lang-toggle').addEventListener('click', switchLanguage);
    document.getElementById('lang-toggle-mobile').addEventListener('click', switchLanguage);

    // 原有页面功能代码
    const menuToggle = document.getElementById('menu-toggle');
    const mobileMenu = document.getElementById('mobile-menu');
    
    menuToggle.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
      menuToggle.innerHTML = mobileMenu.classList.contains('hidden') ? '<i class="fa fa-bars text-xl"></i>' : '<i class="fa fa-times text-xl"></i>';
    });
    
    window.addEventListener('scroll', () => {
      const header = document.querySelector('header');
      if (window.scrollY > 50) {
        header.classList.add('shadow-xl');
        header.classList.remove('shadow-lg');
      } else {
        header.classList.remove('shadow-xl');
        header.classList.add('shadow-lg');
      }

      const reveals = document.querySelectorAll('.reveal');
      reveals.forEach(el => {
        const elTop = el.getBoundingClientRect().top;
        if (elTop < window.innerHeight - 150) el.classList.add('active');
      });
    });

    // 页面加载初始化
    document.addEventListener('DOMContentLoaded', () => {
      window.dispatchEvent(new Event('scroll'));
    });
  </script>
