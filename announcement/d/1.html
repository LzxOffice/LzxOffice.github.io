
<!DOCTYPE html>

        <h1 class="tech-detail-title" data-lang="announcement.detailTitle">新增公告功能通知</h1>
        <div class="card-meta tech-card-meta">
          <span data-lang="announcement.metaTime">发布时间：2026 /03 /04</span>
          <span data-lang="announcement.metaAuthor">发布人：Lzx</span>

        <div class="tech-detail-content">
          <p data-lang="announcement.content1">尊敬的用户：</p>

            <li data-lang="announcement.content3">1. 公告页面 UI 与主页面保持大致相同；</li>

          </ul>
          <p data-lang="announcement.content6">如在使用过程中遇到任何问题，可通过联系工作室人员反馈，我们将及时处理。</p>
          <p data-lang="announcement.content7">感谢您的支持与理解！</p>
          <p data-lang="announcement.content8">LzxOffice 团队<br>2026 年 3 月 4 日</p>
        </div>
      </div>
    </div>
